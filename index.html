<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Auto Alliance - Atelier de Réparation Automobile | Lyon 7ème</title>
<meta name="description" content="Garage Auto Alliance - Expert en réparation automobile à Lyon. 453 avis clients, note 4.5/5. Diagnostic, révision, freinage, carrosserie. Appelez le +33 4 72 71 86 31">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08111f;
--bg2:#0d1a2e;
--bg3:#111f35;
--gold:#c9963a;
--gold2:#e8b84b;
--gold-light:#f5d98a;
--text:#e8e0d4;
--text2:#a89880;
--white:#ffffff;
--red:#991b1b;
--radius:12px;
--radius2:24px;
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;line-height:1.6}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.2}
a{text-decoration:none;color:inherit}
img{max-width:100%}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* TIMER BANNER */
#timer-banner{
  position:sticky;top:0;z-index:1000;
  background:var(--red);
  padding:10px 20px;
  text-align:center;
  font-family:'DM Sans',sans-serif;
  font-size:0.88rem;
  font-weight:500;
  letter-spacing:0.03em;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.15);
}
#timer-banner span.label{color:rgba(255,255,255,0.9)}
#timer-banner span.countdown{
  background:rgba(0,0,0,0.3);
  color:#fff;
  font-weight:700;
  padding:2px 10px;
  border-radius:6px;
  font-size:0.92rem;
  letter-spacing:0.08em;
  font-variant-numeric:tabular-nums;
}
#timer-banner .close-btn{
  position:absolute;right:16px;
  background:none;border:none;
  color:rgba(255,255,255,0.7);
  cursor:pointer;font-size:1.1rem;
  line-height:1;padding:4px;
  transition:color 0.2s;
}
#timer-banner .close-btn:hover{color:#fff}

/* NAV */
nav{
  position:sticky;top:0;z-index:999;
  background:rgba(8,17,31,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(201,150,58,0.2);
  padding:0 5%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:72px;
  transition:all 0.3s;
}
.nav-logo{
  display:flex;align-items:center;gap:12px;
}
.nav-logo-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;
  flex-shrink:0;
}
.nav-logo-text{
  display:flex;flex-direction:column;
  line-height:1.1;
}
.nav-logo-text strong{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  color:var(--white);
  letter-spacing:0.02em;
}
.nav-logo-text span{
  font-size:0.72rem;
  color:var(--gold);
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-weight:500;
}
.nav-links{
  display:flex;align-items:center;gap:32px;
  list-style:none;
}
.nav-links a{
  font-size:0.88rem;
  font-weight:500;
  color:var(--text2);
  letter-spacing:0.04em;
  transition:color 0.2s;
  text-transform:uppercase;
}
.nav-links a:hover{color:var(--gold)}
.nav-cta{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--bg) !important;
  padding:10px 22px;
  border-radius:8px;
  font-weight:600 !important;
  font-size:0.85rem !important;
  letter-spacing:0.05em;
  transition:all 0.3s !important;
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;
}
.nav-cta:hover{
  background:linear-gradient(135deg,var(--gold2),var(--gold-light));
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(201,150,58,0.4);
  color:var(--bg) !important;
}
.hamburger{
  display:none;
  background:none;border:none;
  cursor:pointer;padding:6px;
  flex-direction:column;gap:5px;
}
.hamburger span{
  display:block;width:24px;height:2px;
  background:var(--gold);border-radius:2px;
  transition:all 0.3s;
}
.mobile-menu{
  display:none;
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(8,17,31,0.98);
  z-index:9999;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:32px;
}
.mobile-menu.active{display:flex}
.mobile-menu a{
  font-family:'Playfair Display',serif;
  font-size:1.8rem;
  color:var(--text);
  transition:color 0.2s;
}
.mobile-menu a:hover{color:var(--gold)}
.mobile-close{
  position:absolute;top:24px;right:24px;
  background:none;border:none;
  color:var(--text2);cursor:pointer;
  font-size:1.6rem;
}

/* HERO */
#hero{
  min-height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  overflow:hidden;
  padding:80px 5% 60px;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(201,150,58,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(201,150,58,0.05) 0%, transparent 50%),
    linear-gradient(135deg, #08111f 0%, #0d1a2e 50%, #08111f 100%);
}
.hero-grid-lines{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(201,150,58,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,150,58,0.04) 1px, transparent 1px);
  background-size:60px 60px;
}
.hero-circle1{
  position:absolute;right:-100px;top:50%;
  transform:translateY(-50%);
  width:600px;height:600px;
  border-radius:50%;
  border:1px solid rgba(201,150,58,0.12);
}
.hero-circle2{
  position:absolute;right:-180px;top:50%;
  transform:translateY(-50%);
  width:800px;height:800px;
  border-radius:50%;
  border:1px solid rgba(201,150,58,0.06);
}
.hero-content{
  position:relative;z-index:2;
  max-width:780px;
}
.hero-badge{
  display:inline-flex;
  align-items:center;gap:8px;
  background:rgba(201,150,58,0.1);
  border:1px solid rgba(201,150,58,0.3);
  padding:8px 18px;
  border-radius:50px;
  margin-bottom:28px;
  font-size:0.8rem;
  font-weight:500;
  color:var(--gold);
  letter-spacing:0.1em;
  text-transform:uppercase;
}
.hero-badge::before{
  content:'';
  width:6px;height:6px;
  border-radius:50%;
  background:var(--gold);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(1.3)}
}
.hero h1{
  font-size:clamp(2.4rem,5vw,4.2rem);
  font-weight:700;
  line-height:1.1;
  margin-bottom:24px;
  color:var(--white);
}
.hero h1 em{
  font-style:italic;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-desc{
  font-size:1.1rem;
  color:var(--text2);
  max-width:560px;
  margin-bottom:40px;
  font-weight:300;
  line-height:1.7;
}
.hero-ctas{
  display:flex;flex-wrap:wrap;gap:16px;
  margin-bottom:56px;
}
.btn-primary{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--bg);
  padding:15px 32px;
  border-radius:var(--radius);
  font-weight:600;
  font-size:0.95rem;
  letter-spacing:0.04em;
  transition:all 0.3s;
  border:none;cursor:pointer;
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(201,150,58,0.45);
}
.btn-secondary{
  display:inline-flex;align-items:center;gap:10px;
  background:transparent;
  color:var(--text);
  padding:15px 32px;
  border-radius:var(--radius);
  font-weight:500;
  font-size:0.95rem;
  letter-spacing:0.04em;
  transition:all 0.3s;
  border:1px solid rgba(201,150,58,0.35);
}
.btn-secondary:hover{
  background:rgba(201,150,58,0.08);
  border-color:var(--gold);
  color:var(--gold);
  transform:translateY(-2px);
}
.hero-stats{
  display:flex;flex-wrap:wrap;gap:40px;
}
.stat{
  display:flex;flex-direction:column;gap:4px;
}
.stat-number{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  font-weight:700;
  color:var(--gold);
  line-height:1;
}
.stat-label{
  font-size:0.8rem;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:500;
}
.stat-divider{
  width:1px;background:rgba(201,150,58,0.2);
  align-self:stretch;
}

/* TRUST RIBBON */
#trust{
  background:rgba(13,26,46,0.8);
  border-top:1px solid rgba(201,150,58,0.15);
  border-bottom:1px solid rgba(201,150,58,0.15);
  padding:20px 5%;
}
.trust-inner{
  display:flex;
  flex-wrap:wrap;
  gap:16px 32px;
  justify-content:center;
  align-items:center;
}
.trust-item{
  display:flex;align-items:center;gap:10px;
  font-size:0.85rem;
  font-weight:500;
  color:var(--text2);
  white-space:nowrap;
}
.trust-item .check{
  width:20px;height:20px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;
  color:var(--bg);
  flex-shrink:0;
  font-weight:700;
}

/* MARQUEE */
#marquee{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  padding:16px 0;
  overflow:hidden;
  position:relative;
}
#marquee::before,#marquee::after{
  content:'';
  position:absolute;top:0;bottom:0;width:80px;z-index:2;
}
#marquee::before{left:0;background:linear-gradient(90deg,var(--gold),transparent)}
#marquee::after{right:0;background:linear-gradient(-90deg,var(--gold),transparent)}
.marquee-track{
  display:flex;
  gap:0;
  animation:marquee 30s linear infinite;
  width:max-content;
}
.marquee-track:hover{animation-play-state:paused}
@keyframes marquee{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}
.marquee-item{
  display:flex;align-items:center;gap:10px;
  padding:0 36px;
  font-size:0.82rem;
  font-weight:700;
  color:var(--bg);
  letter-spacing:0.12em;
  text-transform:uppercase;
  white-space:nowrap;
  border-right:1px solid rgba(8,17,31,0.2);
}
.marquee-item::before{
  content:'◆';
  font-size:0.5rem;
  opacity:0.7;
}

/* SERVICES */
#services{
  padding:100px 5%;
}
.section-header{
  text-align:center;
  margin-bottom:64px;
}
.section-tag{
  display:inline-block;
  font-size:0.75rem;
  font-weight:600;
  color:var(--gold);
  text-transform:uppercase;
  letter-spacing:0.18em;
  margin-bottom:16px;
  padding:6px 16px;
  border:1px solid rgba(201,150,58,0.3);
  border-radius:50px;
}
.section-header h2{
  font-size:clamp(1.8rem,3.5vw,2.8rem);
  font-weight:700;
  color:var(--white);
  margin-bottom:16px;
}
.section-header h2 em{
  font-style:italic;
  color:var(--gold);
}
.section-header p{
  font-size:1rem;
  color:var(--text2);
  max-width:520px;
  margin:0 auto;
  line-height:1.7;
}
.services-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}
.service-card{
  background:var(--bg2);
  border:1px solid rgba(201,150,58,0.12);
  border-radius:var(--radius2);
  padding:40px 32px;
  position:relative;
  overflow:hidden;
  transition:all 0.4s;
  cursor:default;
}
.service-card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,150,58,0.06) 0%,transparent 60%);
  opacity:0;
  transition:opacity 0.4s;
}
.service-card:hover{
  border-color:rgba(201,150,58,0.4);
  transform:translateY(-6px);
  box-shadow:0 20px 60px rgba(0,0,0,0.4),0 0 0 1px rgba(201,150,58,0.15);
}
.service-card:hover::before{opacity:1}
.service-num{
  font-family:'Playfair Display',serif;
  font-size:3.5rem;
  font-weight:900;
  color:rgba(201,150,58,0.1);
  line-height:1;
  margin-bottom:20px;
  letter-spacing:-0.02em;
  position:relative;
}
.service-icon{
  width:52px;height:52px;
  background:linear-gradient(135deg,rgba(201,150,58,0.15),rgba(201,150,58,0.05));
  border:1px solid rgba(201,150,58,0.25);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;
  margin-bottom:20px;
  transition:all 0.3s;
}
.service-card:hover .service-icon{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-color:var(--gold);
}
.service-card h3{
  font-size:1.25rem;
  font-weight:700;
  color:var(--white);
  margin-bottom:12px;
}
.service-card p{
  font-size:0.88rem;
  color:var(--text2);
  line-height:1.7;
  margin-bottom:20px;
}
.service-tag{
  display:inline-block;
  font-size:0.72rem;
  font-weight:600;
  color:var(--gold);
  background:rgba(201,150,58,0.1);
  padding:4px 12px;
  border-radius:50px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

/* TESTIMONIALS */
#testimonials{
  padding:100px 5%;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 50%,var(--bg) 100%);
}
.reviews-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:24px;
  margin-bottom:56px;
}
.google-badge{
  display:flex;align-items:center;gap:16px;
  background:var(--bg3);
  border:1px solid rgba(201,150,58,0.2);
  border-radius:var(--radius);
  padding:16px 24px;
}
.google-badge .g-logo{
  font-size:1.6rem;font-weight:700;
  background:linear-gradient(135deg,#4285F4,#EA4335,#FBBC05,#34A853);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.google-badge .g-info strong{
  display:block;
  font-size:1.4rem;
  font-family:'Playfair Display',serif;
  color:var(--white);
}
.google-badge .g-info span{
  font-size:0.8rem;
  color:var(--text2);
}
.stars{display:flex;gap:3px}
.star{color:var(--gold);font-size:0.9rem}
.star.half{opacity:0.5}
.reviews-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
}
.review-card{
  background:var(--bg3);
  border:1px solid rgba(201,150,58,0.12);
  border-radius:var(--radius2);
  padding:32px;
  transition:all 0.3s;
  position:relative;
}
.review-card:hover{
  border-color:rgba(201,150,58,0.3);
  transform:translateY(-4px);
  box-shadow:0 16px 50px rgba(0,0,0,0.3);
}
.review-card::before{
  content:'"';
  position:absolute;top:16px;right:24px;
  font-family:'Playfair Display',serif;
  font-size:5rem;
  color:rgba(201,150,58,0.08);
  line-height:1;
}
.reviewer{
  display:flex;align-items:center;gap:14px;
  margin-bottom:16px;
}
.reviewer-avatar{
  width:46px;height:46px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  font-size:1rem;
  color:var(--bg);
  flex-shrink:0;
  font-family:'Playfair Display',serif;
}
.reviewer-info strong{
  display:block;
  font-size:0.95rem;
  color:var(--white);
  font-weight:600;
}
.reviewer-info span{
  font-size:0.78rem;
  color:var(--text2);
}
.review-stars{margin-bottom:14px}
.review-text{
  font-size:0.88rem;
  color:var(--text2);
  line-height:1.7;
  font-style:italic;
}

/* CTA FINALE */
#cta{
  padding:100px 5%;
  text-align:center;
}
.cta-container{
  max-width:900px;
  margin:0 auto;
  background:var(--bg2);
  border:1px solid rgba(201,150,58,0.2);
  border-radius:32px;
  padding:72px 48px;
  position:relative;
  overflow:hidden;
}
.cta-container::before{
  content:'';
  position:absolute;
  top:-100px;left:50%;
  transform:translateX(-50%);
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(201,150,58,0.1) 0%,transparent 70%);
  pointer-events:none;
}
.cta-container h2{
  font-size:clamp(1.8rem,3vw,2.6rem);
  color:var(--white);
  margin-bottom:16px;
}
.cta-container h2 em{color:var(--gold)}
.cta-container p{
  font-size:1rem;
  color:var(--text2);
  max-width:480px;
  margin:0 auto 48px;
  line-height:1.7;
}
.price-boxes{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:48px;
}
.price-box{
  background:var(--bg3);
  border:1px solid rgba(201,150,58,0.15);
  border-radius:var(--radius);
  padding:28px 20px;
  text-align:center;
  transition:all 0.3s;
}
.price-box:hover{
  border-color:var(--gold);
  background:rgba(201,150,58,0.05);
}
.price-box.featured{
  background:linear-gradient(135deg,rgba(201,150,58,0.15),rgba(201,150,58,0.05));
  border-color:var(--gold);
  position:relative;
}
.price-box.featured::after{
  content:'POPULAIRE';
  position:absolute;top:-12px;left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--bg);
  font-size:0.65rem;
  font-weight:700;
  padding:4px 14px;
  border-radius:50px;
  letter-spacing:0.1em;
}
.price-box-icon{font-size:2rem;margin-bottom:10px}
.price-box h4{
  font-family:'Playfair Display',serif;
  font-size:1rem;
  color:var(--white);
  margin-bottom:6px;
}
.price-box p{
  font-size:0.8rem;
  color:var(--text2);
  margin-bottom:0;
}
.cta-buttons{
  display:flex;flex-wrap:wrap;gap:16px;
  justify-content:center;
}
.phone-big{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  color:var(--gold);
  font-weight:700;
  letter-spacing:0.04em;
}
.cta-note{
  margin-top:24px;
  font-size:0.8rem;
  color:var(--text2);
  opacity:0.7;
}

/* FOOTER */
footer{
  background:var(--bg2);
  border-top:1px solid rgba(201,150,58,0.15);
  padding:48px 5% 32px;
}
.footer-inner{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:40px;
  align-items:start;
  margin-bottom:32px;
}
.footer-brand .brand-name{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;
  font-weight:700;
  color:var(--white);
  margin-bottom:8px;
}
.footer-brand p{
  font-size:0.83rem;
  color:var(--text2);
  max-width:280px;
  line-height:1.6;
}
.footer-col h4{
  font-size:0.75rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.14em;
  color:var(--gold);
  margin-bottom:16px;
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:opacity 0.7s ease,transform 0.7s ease;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}
.reveal-left{
  opacity:0;
  transform:translateX(-30px);
  transition:opacity 0.7s ease,transform 0.7s ease;
}
.reveal-left.active{
  opacity:1;
  transform:translateX(0);
}

.d1{transition-delay:0.1s}

.d3{transition-delay:0.3s}
.d4{transition-delay:0.4s}
